name: Release

# Build installers for all three desktop OSes and publish them to a GitHub
# Release whenever a version tag (e.g. v0.2.0) is pushed. Can also be run
# manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — universal binary (Apple Silicon + Intel) → .dmg
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          # Linux — .AppImage (portable) + .deb. Built on 22.04 for broad glibc
          # compatibility (an AppImage built on a newer distro requires newer libc).
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          # Windows — .msi + NSIS .exe
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            curl wget file libssl-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ImAlive ${{ github.ref_name }}'
          releaseBody: |
            Desktop builds for macOS, Linux, and Windows are attached below.

            These builds are **unsigned** (no paid signing certificates yet), so
            the OS will warn on first launch — see the README for the one-time
            steps per platform.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
